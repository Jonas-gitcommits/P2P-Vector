syntax = "proto3";

package p2pvector;

service VectorStore {
  rpc SearchSimilar (SearchRequest) returns (SearchResponse) {}
  rpc Ping (PingRequest) returns (PingResponse) {}
}

message Vector {
  bytes values = 1;
}

message Peer {
  string ip = 1;
  int32 port = 2;
}

message SearchRequest {
  Vector query = 1;
  int32 k = 2;
  int32 ttl = 3;
  repeated string visited_peers = 4;
  string sender_ip = 5;
  int32 sender_port = 6;
  float kth_dist = 7;
  int32 fanout_k = 8;
  float early_stop_threshold = 9;
}

message SearchResponse {
  repeated Peer nearest_peers = 1;
  repeated float distances = 2;
  int32 rpc_count = 3;
  repeated string visited_nodes = 4;
  repeated int64 vector_ids = 5;
}

message PingRequest {
  string sender_ip = 1;
}

message PingResponse {
  bool alive = 1;
  int32 neighbor_count = 2;
  bytes summary = 3;
  int32 summary_count = 4;
}